<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIS Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #0e0e0e;
      color: #d4d4d4;
      font-size: 13px;
      padding: 16px;
    }

    h1 { color: #ffffff; font-size: 18px; margin-bottom: 12px; }

    #status-bar {
      display: flex;
      gap: 24px;
      align-items: center;
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 10px 14px;
      border-radius: 4px;
      margin-bottom: 16px;
    }

    #conn-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      margin-right: 6px;
    }
    #conn-indicator.connected { background: #3fb950; }
    #conn-indicator.disconnected { background: #f85149; }

    #conn-text { color: #ccc; }
    #message-count { color: #58a6ff; }

    #log-header {
      color: #888;
      margin-bottom: 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #log {
      width: 100%;
      border-collapse: collapse;
    }

    #log thead th {
      text-align: left;
      color: #888;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 4px 8px;
      border-bottom: 1px solid #333;
    }

    #log tbody tr {
      border-bottom: 1px solid #1e1e1e;
    }

    #log tbody tr:hover {
      background: #1a1a1a;
    }

    #log tbody td {
      padding: 5px 8px;
      vertical-align: top;
      white-space: nowrap;
    }

    .new-flash {
      animation: flash 0.6s ease-out;
    }

    @keyframes flash {
      from { background-color: #1f3a1f; }
      to   { background-color: transparent; }
    }

    .col-mmsi    { color: #e3b341; min-width: 100px; }
    .col-name    { color: #79c0ff; min-width: 140px; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .col-type    { color: #bc8cff; min-width: 80px; }
    .col-lat     { color: #d4d4d4; min-width: 90px; }
    .col-lon     { color: #d4d4d4; min-width: 90px; }
    .col-speed   { color: #3fb950; min-width: 60px; }
    .col-course  { color: #d4d4d4; min-width: 60px; }
    .col-heading { color: #d4d4d4; min-width: 60px; }
    .col-status  { color: #8b949e; min-width: 160px; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .col-time    { color: #555; min-width: 80px; }

    .dim { color: #555; }
  </style>
</head>
<body>

<h1>AIS Viewer</h1>

<div id="status-bar">
  <span>
    <span id="conn-indicator" class="disconnected"></span>
    <span id="conn-text">Disconnected from AISStream</span>
  </span>
  <span id="message-count">0 messages received</span>
  <span id="browser-ws-status" style="color:#555;">Browser: connecting…</span>
</div>

<div id="log-header">Recent AIS updates — newest first (max 100 rows shown)</div>

<table id="log">
  <thead>
    <tr>
      <th>MMSI</th>
      <th>Ship Name</th>
      <th>Type</th>
      <th>Latitude</th>
      <th>Longitude</th>
      <th>Speed (kn)</th>
      <th>Course °</th>
      <th>Heading °</th>
      <th>Nav Status</th>
      <th>Timestamp (UTC)</th>
    </tr>
  </thead>
  <tbody id="log-body">
    <tr id="waiting-row">
      <td colspan="10" class="dim" style="padding:12px 8px;">Waiting for data…</td>
    </tr>
  </tbody>
</table>

<script>
  const MAX_ROWS = 100;
  const logBody = document.getElementById('log-body');
  const connIndicator = document.getElementById('conn-indicator');
  const connText = document.getElementById('conn-text');
  const messageCount = document.getElementById('message-count');
  const browserWsStatus = document.getElementById('browser-ws-status');

  let totalReceived = 0;
  let rowCount = 0;

  function fmt(v, decimals = 2) {
    return v != null ? Number(v).toFixed(decimals) : '<span class="dim">—</span>';
  }

  function shortType(type) {
    // Shorten verbose type names for display
    const map = {
      'PositionReport': 'PosRpt',
      'StandardClassBPositionReport': 'ClassB',
      'ShipStaticData': 'Static',
      'ExtendedClassBPositionReport': 'ClassB+',
      'AidsToNavigationReport': 'AtoN',
      'BaseStationReport': 'BaseStation',
    };
    return map[type] || type;
  }

  function setConnectionStatus(connected) {
    connIndicator.className = connected ? 'connected' : 'disconnected';
    connText.textContent = connected
      ? 'Connected to AISStream'
      : 'Disconnected from AISStream';
  }

  function setCount(n) {
    totalReceived = n;
    messageCount.textContent = `${n.toLocaleString()} message${n !== 1 ? 's' : ''} received`;
  }

  function prependRow(u) {
    // Remove the "Waiting..." placeholder on first message
    const waiting = document.getElementById('waiting-row');
    if (waiting) waiting.remove();

    const tr = document.createElement('tr');
    tr.className = 'new-flash';
    tr.innerHTML = `
      <td class="col-mmsi">${u.mmsi}</td>
      <td class="col-name" title="${u.shipName}">${u.shipName}</td>
      <td class="col-type">${shortType(u.messageType)}</td>
      <td class="col-lat">${fmt(u.latitude, 5)}</td>
      <td class="col-lon">${fmt(u.longitude, 5)}</td>
      <td class="col-speed">${fmt(u.speed, 1)}</td>
      <td class="col-course">${fmt(u.course, 1)}</td>
      <td class="col-heading">${fmt(u.heading, 0)}</td>
      <td class="col-status" title="${u.navStatus || ''}">${u.navStatus || '<span class="dim">—</span>'}</td>
      <td class="col-time">${u.timestamp ? u.timestamp.replace('T', ' ').replace(/\.\d+Z$/, '') : ''}</td>
    `;
    logBody.insertBefore(tr, logBody.firstChild);
    rowCount++;

    // Trim to MAX_ROWS
    while (rowCount > MAX_ROWS) {
      logBody.removeChild(logBody.lastChild);
      rowCount--;
    }
  }

  // -----------------------------------------------------------------------
  // WebSocket connection to local backend
  // -----------------------------------------------------------------------

  function connect() {
    const ws = new WebSocket(`ws://${location.host}`);

    ws.addEventListener('open', () => {
      browserWsStatus.textContent = 'Browser: connected';
      browserWsStatus.style.color = '#3fb950';
    });

    ws.addEventListener('close', () => {
      browserWsStatus.textContent = 'Browser: reconnecting…';
      browserWsStatus.style.color = '#e3b341';
      setTimeout(connect, 3000);
    });

    ws.addEventListener('error', () => {
      browserWsStatus.textContent = 'Browser: error';
      browserWsStatus.style.color = '#f85149';
    });

    ws.addEventListener('message', (event) => {
      let msg;
      try { msg = JSON.parse(event.data); } catch { return; }

      switch (msg.type) {
        case 'status':
          setConnectionStatus(msg.connected);
          if (msg.totalReceived != null) setCount(msg.totalReceived);
          break;

        case 'update':
          if (msg.update) prependRow(msg.update);
          if (msg.totalReceived != null) setCount(msg.totalReceived);
          break;

        case 'snapshot':
          setConnectionStatus(msg.connected);
          if (msg.totalReceived != null) setCount(msg.totalReceived);
          if (Array.isArray(msg.messages)) {
            // Load history newest-first (already sorted that way by server)
            // Insert in reverse so the DOM order ends up newest-first
            for (let i = msg.messages.length - 1; i >= 0; i--) {
              prependRow(msg.messages[i]);
            }
          }
          break;
      }
    });
  }

  connect();
</script>
</body>
</html>
